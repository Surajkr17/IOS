name: health_trace
description: "A production-ready Flutter health-tech mobile application following clean architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Models & Serialization
  json_annotation: ^4.8.0

  # UI/UX
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0

  # Utilities
  get_it: ^7.6.0
  logger: ^2.1.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Testing
  mockito: ^5.4.0

flutter:
  uses-material-design: true

